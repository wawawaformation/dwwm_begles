<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>Footer mobile first</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="">
    <style>
         #footer {
            width: 393px;
            background-color: #FAF2E6;
        }

        .menu {
            display: flex;
            list-style-type: none;
            padding: 0;
            gap: 2rem;
            align-items: center;
        }

        .menu-footer {
            flex-direction: column;
            padding-top: 1.5rem;
            padding-bottom: 1rem;
        }

        .menu-contact {
            flex-direction: row;
            justify-content: center;
            padding-bottom: 1.5rem;
    
        }
        .menu-contact a {
            font-size: 1.5rem;
        }

        a {
            text-decoration: none;
            color: #6622CC;
            font-size: 1rem;
        }

        a:hover {
            text-decoration: underline;
            opacity: 50%;
        }
        

    </style>
<body>
    <footer id="footer">
        <ul class="menu menu-footer">
            <li class="item"><a href="">Mentions légales
            </a></li>
            <li class="item"><a href="">À propos</a></li>

        </ul>
        <ul class="menu menu-contact">
            <li class="item"><a href=""><i class="bi bi-facebook"></i></a></li>
            <li class="item"><a href=""><i class="bi bi-twitter-x"></i></a></li>

</html>
