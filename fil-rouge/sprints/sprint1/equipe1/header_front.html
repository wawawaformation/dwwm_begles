<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header mobile first</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        #header {
            max-width: 393px;
            background-color: #FAF2E6;
            padding: 1rem;
        }

        .menu {
            display: flex;
            list-style-type: none;
            padding: 0;
        }

        .menu-principal {
            justify-content: space-between;
            align-items: center;
        }

        .menu-liens {
            flex-direction: column;
            text-align: center;
            margin-top: 1rem;
            display: none;
            /* caché par défaut */

        }

        .menu-liens.active {
            display: flex;
        }

        .menu-liens li.item {
            box-shadow: 0 2px 5px -2px #6622CC;
            padding: 0.5rem;
        }

        a {
            text-decoration: none;
            color: #6622CC;
            font-size: 1rem;
        }

        a:hover {
            text-decoration: underline;
            color: #6622CC;
        }

        .item i {
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <header id="header">
        <nav>
            <ul class="menu menu-principal d-flex">
                <li class="item"><a href="#" id="toggle-menu"><i class="bi bi-list"></i></a></li>
                <li><img src="modif/public/img/logo.svg" alt="logo" width="124"></li>
                <li class="item"><a href="#"><i class="bi bi-search"></i></a></li>
            </ul>

            <ul class="menu menu-liens" id="nav-links">
                <li class="item"><a href="#">Les Citations</a></li>
                <li class="item"><a href="#">Les Auteurs</a></li>
                <li class="item"><a href="#">API</a></li>
                <li class="item"><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <script>
        const toggleBtn = document.getElementById("toggle-menu");
        const navLinks = document.getElementById("nav-links");

        toggleBtn.addEventListener("click", function (e) {
            e.preventDefault();
            navLinks.classList.toggle("active");
        });
    </script>
</body>

</html>
